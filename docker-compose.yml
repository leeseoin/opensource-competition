services:
  postgres:
    image: postgres:16
    container_name: agentpay-guard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agentpay_guard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - agentpay_guard_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentpay_guard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agentpay_guard_postgres_data:
